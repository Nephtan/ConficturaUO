  current_open_tarot_page: 13
  current_open_tarot_page_type: "visible_card_page_star_read_no_card_chosen"
  current_open_gump_text:
    source: "GypsyTarotGump page 13 AddHtml -> cardText(page, section, from.RaceID)"
    read_status: "read_interpreted"
    visible_title: "THE STAR"
    visible_town_line: "The Shuttle Crash Site"
    visible_body_summary: "The card offers an alien crash start: no memory, no starting skills, no Sosarian gold, 40 grandmaster-skill capacity before configured boosts, three-times resurrection cost, severe fame/karma/skill/stat losses around tribute, no luck benefit, four-times guild fees, a crash-site computer terminal for appearance changes, and survival pressure from only a knife, alien meat, an empty canteen, and the mountain crash site if the card is actually drawn."
    visible_controls:
      - "top-right OK/card-selection button sends reply 113 and would call EnterLand(13)"
      - "left arrow sends reply 9 and would reopen page 9"
      - "no right arrow is visible because pageShow forward from page 13 returns 20"
      - "gump is closable through normal close control"
      - "no text-entry fields are present"
      - "scrollbar is true for human page 13"
    actionable_facts_visible_on_card:
      - "The Star is the last currently visible normal human tarot card."
      - "The visible destination is The Shuttle Crash Site."
      - "The OK button would draw the card and commit the alien crash start, but the player has not pressed it."
      - "The left arrow can return to the Hanged Man/Britain Dungeons card; no forward arrow is exposed from this card."
      - "The card body warns that alien play changes skill capacity, starting skills, starting gold, resurrection penalties, luck, guild costs, equipment, and crash-site survival, but those mutations require the OK/EnterLand/CrashRegion path."
    mechanical_state_changes_from_page_button:
      - "GypsyTarotGump page 9 was closed."
      - "GypsyTarotGump page 13 was sent."
      - "A page-turn sound was played."
      - "No MoveToWorld, PlayerSettings.SetDiscovered, CrashRegion.OnEnter, PlayerSettings.SetSpaceMan, SkillBegin('alien'), inventory wipe, skill reset, race change, name change, or PvP/PvE mutation occurred."
    actionable_facts_visible_in_intro:
      - "top-right button begins looking through the tarot deck"
      - "arrow buttons page through cards after the deck starts"
      - "OK button on a visible card draws that card"
      - "the nearby gypsy potion shelf can be used before tarot to choose a non-human species while monster characters are allowed"
      - "Thuvia outside the tent handles PvP/PvE safety choices"
      - "taverns, inns, and banks are safer than open travel"
      - "guards in settlements punish murderers and criminals"
      - "merchant buy/sell choices can vary day to day"
      - "Sosaria settlement outskirts are relatively safer for hunting"
      - "minor dungeons near settlements exist but traps can kill quickly"
      - "the visitor journal on the table can change the character name before tarot"
    mechanical_state_changes_from_reading: "none; reading page 13 text granted player knowledge only, not discovery flags, travel, alien status, skill-cap changes, skill resets, inventory changes, race changes, name changes, or PvP/PvE mode changes"
  accessible_tarot_cards:
