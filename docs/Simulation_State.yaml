  thuvia_interaction:
    - "GoddessOfProtection.OnMovement prompts a PlayerMobile within 8 tiles and tells them to say 'help' or 'choose'."
    - "GoddessOfProtection.HandlesOnSpeech only explicitly opts in at range 3 before falling back to BaseCreature behavior; CheckSpeech is called from OnSpeech only when the mobile is within 6."
    - "GoddessOfProtection.CheckSpeech with 'help' only speaks an explanation; 'choose' sends the PKNONPK gump."
    - "The prior run used the normal 'choose' speech branch from close range, opening PKNONPK."
    - "A prior consent run pressed the visible Remain Neutral reply. PKNONPK.OnResponse case 0 set NONPK to Null, Title to null, sent neutrality messages, and closed the gump."
    - "ChoosePvP_OnCommand only blocks players whose NONPK is not Null, so the neutral reply remains mechanically reopenable."
