    - "Regions.xml defines CrashRegion the Crash Site around the page-13 destination, and the character entered it after pressing the visible page-13 OK button."
  tarot_gates:
    - "ShardGreeterEntry.OnClick requires X=3567,Y=3404 or RaceID > 0 before opening GypsyTarotGump."
    - "GypsyTarotGump.pageShow hides Lodoria pages without visitLodor, Savage page without visitSavage, and alien page without AllowAlienChoice."
    - "visitLodor checks account characters for discovery of the Land of Lodoria."
    - "visitSavage checks account characters for discovery of the Savaged Empire."
  visual_scan:
    - "Map.GetItemsInRange and Map.GetMobilesInRange default to an 18-tile rectangle around the current Point3D."
    - "Data/Decoration/Sosaria/decorate.cfg places ComputerDatabase and GlowingLight named computer terminal at 4108,3779 near the crash-site arrival point."
    - "A static scan of the searched .map spawn files found no deterministic mobile home within 18 tiles of Point3D(4109,3775,2)."
    - "A static destination scan around Point3D(1075,1312,2) found no deterministic decorated item coordinate and no deterministic mobile home/current position inside the 18-tile box."
    - "Data/Scripts/System/Misc/MapDefinitions.cs registers Map.Sosaria with mapIndex=1, mapID=1, and fileIndex=1, so binary Sosaria terrain/static scans must use map1.mul, staidx1.mul, and statics1.mul."
    - "The corrected Data/Files/map1.mul plus Data/Files/tiledata.mul scan decodes Point3D(1075,1312,2) as tile 0x4 grass at z=2, dry and passable; nearby west and northwest/farther-north pressure includes impassable rock or impassable grass, while direct north, east, and south remain walkable grass with east/south opening into grass/jungle wilderness."
    - "Data/Files/staidx1.mul plus Data/Files/statics1.mul found two static tiles within 3 tiles and 63 static tiles within 18 tiles of Point3D(1075,1312,2), with no DrinkingFunctions.CheckWaterTarget ID hit."
    - "animals.map lines 237, 602, 1111, 1163, and 1227 plus world.map lines 204, 385, 706, 758, and 834 have spawn ranges that overlap the Point3D(1075,1312,2) destination scan; they are potential live entities, not confirmed visible mobiles."
  computer_terminal:
    - "ComputerDatabase.OnDoubleClick checks from.InRange(GetWorldLocation(), 4); the player at Point3D(4109,3775,2) is within range of the item at 4108,3779,0."
    - "ComputerDatabase.OnDoubleClick closes any existing ComputerDatabaseGump, sends a new ComputerDatabaseGump, and plays sound 0x54D."
    - "ComputerDatabaseGump visible text says the computer is corrupt, references the Medical Record in the backpack, and frames skin/hair swatches as appearance style choices."
    - "ComputerDatabaseGump.OnResponse mutates appearance only after a visible swatch reply: skin replies set Hue/RecordSkinColor and hair replies set HairHue/FacialHairHue/RecordHairColor/RecordBeardColor, then reopens the gump and records features."
    - "This run used the visible deterministic skin swatch reply 2. ComputerDatabaseGump.OnResponse set Hue and RecordSkinColor to 0x6F6, reopened the gump, played sound 0x54B, and called RecordFeatures(true)."
    - "RecordFeatures(true) also wrote RecordHairColor and RecordBeardColor from the current unresolved hair/facial-hair hues; no hair swatch branch ran."
    - "MedicalRecord.OnDoubleClick does not call CloseGump(typeof(ComputerDatabaseGump)), so the terminal gump remains open behind the MedicalRecordGump."
    - "PacketHandlers.DisplayGumpResponse removes the responding gump before calling ComputerDatabaseGump.OnResponse; closing the terminal with no color reply therefore removes the terminal gump and reaches the sound-only OnResponse branch."
    - "ComputerDatabaseGump.OnResponse only reopens the gump and mutates appearance when skinColor > 0 or hairColor > 0; the normal close response leaves both zero and only plays sound 0x54D."
  medical_record:
    - "Mobile.Use gates the backpack item interaction through update range, visibility, accessibility, alive state, item-use permission, and Region.OnDoubleClick before MedicalRecord.OnDoubleClick."
    - "MedicalRecord.OnDoubleClick closes any prior MedicalRecordGump, sends MedicalRecordGump, and plays sound 0x54D."
    - "MedicalRecordGump visible header is 'Medical Record for ' plus DataPatient, with a byline 'By Dr. Thomas Witman'."
    - "MedicalRecordGump body text is SetupMedicalRecord(Data); it can reveal and, if missing, initialize DataPlanet."
    - "The simulated visible DataPlanet is Alaunrae V, generated from Data/System/XML/names.xml dark-elf name lists and roman suffix V."
    - "MedicalRecordGump.OnResponse only plays sound 0x54D and has no visible reply buttons or text-entry fields."
    - "PacketHandlers.DisplayGumpResponse removes the responding gump from state.Gumps before calling its OnResponse; closing the MedicalRecordGump therefore leaves unrelated ComputerDatabaseGump instances alone."
  food_survival:
    - "Mobile.Use gates the backpack food interaction through update range, visibility, accessibility, alive state, item-use permission, and Region.OnDoubleClick before Food.OnDoubleClick."
    - "CookedBird(amount) inherits Food, uses itemID 0x9B7, weight 1.0, and FillFactor 10."
    - "Food.OnDoubleClick ignores non-movable food, then calls Eat(from) when the user is within one tile of the food's world location; backpack food resolves its world location to the player through RootParent."
    - "Food.Eat only plays eating effects, applies poison, heals, and calls Consume() when FillHunger returns true."
    - "Food.FillHunger immediately returns false and sends localized message 500867 when from.Hunger >= 20. The character's Hunger was 20, so no Consume(), poison, stamina, healing, mana, inventory, thirst, skill, stat, quest, discovery, location, Lodoria, or Savage mutation happened."
  drink_survival:
    - "Mobile.Use gates the backpack canteen interaction through update range, visibility, accessibility, alive state, item-use permission, and Region.OnDoubleClick before Waterskin.OnDoubleClick."
    - "PlayerSettings.SetSpaceMan created a Waterskin, set ItemID to 0x4971, named it empty canteen, and placed it in the backpack."
    - "Waterskin.OnDoubleClick calls DrinkingFunctions.CheckWater(from, 3, out soaked) before any fill or drink branch."
    - "DrinkingFunctions.CheckWater scans map items and static tiles in range 3 for water-target item IDs; no decorated water trough, tub, barrel, or visible water source was found in the searched crash-site sources."
    - "Because the canteen was ItemID 0x4971 and no traced water source filled it first, Waterskin.OnDoubleClick sent 'You can only fill this at a water trough, tub, or barrel!' and did not change weight, item ID, name, thirst, stamina, poison, inventory, quests, discovery, location, Lodoria, or Savage state."
    - "At the post-teleport destination, corrected Map.Sosaria terrain is dry grass rather than water; no canteen retry occurred there, and no map item/static tile target was found within 3 tiles."
  crash_site_scouting:
    - "Mobile.Move checks deletion, bank box state, active spell movement, frozen/paralyzed state, CheckMovement, item/mobile OnMoveOver blockers, and Region.CanMove before movement succeeds."
    - "Regions.xml defines the CrashRegion rectangle for 'the Crash Site' as x=4086,y=3745,width=60,height=60, so Point3D(4120,3775,2) remains inside the same named region."
    - "Because the old and new locations are in the same CrashRegion, this scouting move does not rerun CrashRegion.OnEnter or PlayerSettings.SetSpaceMan."
    - "Data/Decoration/Sosaria/decorate.cfg places Teleporter tiles at 4138,3769 through 4138,3773, each with PointDest=(1075,1312,2), Creatures=False, no source/destination effects, SoundID=0, and no delay."
    - "Teleporter constructor sets Visible=false, so the crash-site exit row is mechanically present but not visible to a normal player; the player-facing cue is the cave mouth terrain continuing east."
    - "Teleporter.OnMoveOver only starts the teleport when a mobile moves over the item; stopping at Point3D(4120,3775,2) did not call StartTeleport or DoTeleport, but run 27's continued scouting step onto Point3D(4138,3773,1) did."
    - "Teleporter.DoTeleport uses m.Map when MapDest is null or internal, so the decorated row with no MapDest kept the destination on Map.Sosaria."
    - "Teleporter.DoTeleport calls MoveToWorld(PointDest,map); for the triggered tile this placed the player at Point3D(1075,1312,2)."
    - "No deterministic .map spawner home was found inside the 18-tile box centered on Point3D(4120,3775,2); live save state and wandering positions remain unresolved."
