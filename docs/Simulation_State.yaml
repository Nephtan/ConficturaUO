    - action: "Treat the alien crash start as chosen because The Star is visible"
      gate: "No longer unavailable; it became true only after the visible OK reply 113 was pressed. The prior friction remains: visibility alone was not enough."
    - action: "Treat the potion shelf or visitor journal as used because the introduction mentioned them"
      gate: "GypsySpeech(from) only returned text for AddHtml. RacePotions.OnDoubleClick and ChangeName.OnDoubleClick required separate visible item interactions, and the Star selection moved the player away before using them."
    - action: "Use the crash-site computer terminal"
      gate: "No longer unavailable; completed by double-clicking the visible ComputerDatabase item within its range-4 gate."
    - action: "Change appearance from the terminal"
      gate: "No longer unavailable for skin. It became true only after pressing visible skin swatch reply 2. Hair and facial-hair changes still require a visible hair swatch reply 9-32."
    - action: "Read the Medical Record because the terminal mentions it"
      gate: "No longer unavailable; completed by double-clicking the Medical Record backpack item through normal item-use flow. The read opened MedicalRecordGump and revealed DataPlanet Alaunrae V but granted no travel, skill, quest, inventory, Lodoria, or Savage unlock."
    - action: "Treat the Medical Record as a rescue, quest unlock, or planet-travel key"
      gate: "MedicalRecordGump only displays SetupMedicalRecord text. Its OnResponse only plays sound 0x54D, and no code path writes discovery flags, quests, location, skills, stats, hunger, thirst, or inventory from reading it."
    - action: "Treat closing the Medical Record as accepting its story or closing every tech window"
      gate: "The normal close response removes only MedicalRecordGump and calls MedicalRecordGump.OnResponse, which only plays sound 0x54D; the already-open ComputerDatabaseGump remains open and no record, terminal, quest, inventory, discovery, appearance, location, skill, stat, hunger, or thirst field changes."
    - action: "Treat closing the computer terminal as confirming a new hair color, accepting an origin story, or unlocking rescue"
      gate: "The normal close response removes ComputerDatabaseGump and falls through to the sound-only branch because no skin or hair reply is selected; no appearance, quest, discovery, inventory, location, skill, stat, hunger, or thirst value changes."
    - action: "Convert cooked alien meat into hunger, healing, poison, or a smaller stack while Hunger is already 20"
      gate: "Food.FillHunger checks from.Hunger >= 20 before all eat-side effects and returns false with localized message 500867, so Food.Eat does not call Consume() or apply later food effects."
    - action: "Treat Point3D(1075,1312,2) as visible water terrain"
      gate: "Invalidated. The prior water read used map0.mul, but Map.Sosaria is registered with fileIndex=1. The corrected map1.mul tile is dry passable grass at z=2."
    - action: "Fill the empty canteen from the post-exit grass tile"
      gate: "The corrected screen has no visible trough, tub, barrel, or recognized item/static water target within three tiles, so there is no normal canteen-fill source at Point3D(1075,1312,2)."
    - action: "Drink from or refill the empty canteen at the crash site without a water source"
      gate: "Waterskin.OnDoubleClick first needs CheckWater to find a nearby fill source for an empty ItemID 0x4971 canteen; no visible/decorated water trough, tub, barrel, or water source was traced near Point3D(4109,3775,2), so the action only sent the fill-source message."
    - action: "Deliberately choose a visible teleporter row from Point3D(4120,3775,2)"
      gate: "The Teleporter items are mechanically present at x=4138 but Teleporter.Visible is false, so a normal player cannot see/select the row as a visible lure. The move to PointDest=(1075,1312,2) happened only after normal scouting movement stepped onto the hidden tile."
    - action: "Treat overlapping destination spawner definitions as visible monsters"
      gate: "animals.map/world.map ranges overlap the 18-tile destination scan, but static spawner definitions do not prove a live mobile has materialized or wandered into view."
    - action: "Get Thuvia's help response from Point3D(3570,3416,0) without approaching"
      gate: "GoddessOfProtection prompts within 8 but her traced speech path requires closer range; the player moved to Point3D(3565,3414,0) before speaking."
    - action: "Become PvP or PvE by saying 'help'"
      gate: "The 'help' speech branch only speaks an explanation. The selection gump requires saying 'choose', then using the visible gump buttons."
    - action: "Become PvP, PvE, or explicitly neutral by saying 'choose'"
      gate: "The 'choose' speech branch only opens PKNONPK. State changes happen only through visible OnResponse buttons 1, 2, or 0."
    - action: "Close the PKNONPK window with the normal close control to remain neutral"
      gate: "PKNONPK sets Closable=false; the state-legal neutral route is the visible Remain Neutral reply button."
    - action: "Treat neutral as a distinct committed PvP/PvE mode"
      gate: "PKNONPK case 0 writes NONPK.Null, the same enum value used before choosing; ChoosePvP_OnCommand reopens the selector whenever NONPK is Null."
