    - "known region, teleporter, decorator, and terrain context that could create a normal-player decision"
  follower_shadowing_allowed_when:
    - "follower is controlled, on the same map, alive, and already ordered to Follow"
    - "compressed route keeps follower pathing locally clear or conservatively shadows to the established trailing band"
    - "no combat, Guard/Attack order, ownership mutation, follower-count mutation, body-blocking, target cursor, or pet-specific interaction occurs"
  follower_shadowing_must_record:
    - "approximation label, not exact BaseAI timer execution"
    - "start and end follower Point3D or trailing-band estimate"
    - "path evidence or the uncertainty that stopped the segment"
  ambient_unresolved_allowed_when:
    - "creature is outside the 18-tile client rectangle"
    - "no Combatant, FocusMob, Aggressor, Aggressed, Faction, or Ethic state involves Mira or her follower"
    - "no special timer's current scan can include Mira or her follower"
    - "proposed segment does not bring Mira or her follower back into visible range, RangePerception, movement-notice pressure, or special timer range"
  hard_stop_conditions:
    - "visible hostile or high-risk mobile appears or enters range"
    - "new NPC, corpse, chest, usable item, sign, road, shelter, water source, region text, gump, context menu, or target cursor appears"
    - "movement fails, route evidence is uncertain, or required binary map/static evidence is missing"
    - "random branch affects the outcome and is not already committed"
    - "combat, damage, ownership, follower count, quest, discovery, teleport, region transition, hunger/thirst, skill gain, or open UI state changes"
