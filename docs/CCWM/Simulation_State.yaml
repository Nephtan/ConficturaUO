    - "PacketHandlers.LookReq handles a normal single-click label request, finds a mobile by serial, requires from.CanSee(m), and requires Utility.InUpdateRange(from,m) before calling OnSingleClick."
    - "Utility.InUpdateRange is rectangular, accepting x and y each within 18 tiles."
    - "Run 73: PacketHandlers.LookReq found swamp drake serial 28109, passed CanSee and Utility.InUpdateRange at dx=18,dy=13, Region.OnSingleClick returned true, and BaseCreature/Mobile.OnSingleClick sent only the overhead name label 'a swamp drake'."
    - "SwampDrakeRiding constructs an uncontrolled BaseMount named 'a swamp drake' with AIType.AI_Melee, FightMode.Closest, poison breath, Tamable=true, ControlSlots=2, and MinTameSkill=84.3; none of those hidden mechanics are granted, triggered, or safely tested by a single-click label."
    - "SwampDrakeRiding overrides ReacquireOnMovement to return !Controlled, so the visible uncontrolled drake can be primed by movement notifications. Runs 75 and 76 still did not run its AI timer, AcquireFocusMob, Combatant assignment, movement, melee, or breath."
    - "Run 73 did not request a context menu, select Tame, invoke Taming.InternalTarget, set Combatant, move the player, or mutate inventory, hunger, thirst, quests, discovery flags, followers, ownership, PvP/PvE, fame, karma, or skills. Run 74 advanced only the controlled fox's Follow AI tick and still did not interact with the drake. Run 75 only turned Mira southwest and left the drake unengaged. Run 76 moved Mira southwest, which dropped the drake outside update range. Run 77 advanced only the fox's Follow AI tick. Run 78 moved farther southwest, Run 79 advanced only the fox's Follow AI tick again, and Run 80 only turned Mira southeast; none ran a drake AI path."
