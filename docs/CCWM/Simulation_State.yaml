  pet_command:
    - "Mobile.DoSpeech first invokes global and region speech handlers, then collects nearby objects in regular speech range 15 for ordinary speech."
    - "BaseCreature.HandlesOnSpeech returns true for the controlled fox because BaseAI.HandlesOnSpeech accepts alive owner speech for controlled, commandable creatures, and Mira is inside the fox's RangePerception."
    - "BaseAI.OnSpeech checks owner/friend status, then processes all-command keywords before named commands; keyword 0x16C is all follow me."
    - "The all follow me branch does not open a target cursor. On CheckControlChance success, it sets ControlTarget to the speaker and ControlOrder to Follow."
    - "BaseCreature.GetControlChance returns 1.0 for this fox because MinTameSkill -15.3 is <= 29.1, so Run 59's command obedience is deterministic in the traced code."
    - "BaseCreature.ControlOrder setter calls AI.OnCurrentOrderChanged; the Follow branch reveals the control master, sets CurrentSpeed to ActiveSpeed, plays the idle sound, sets Warmode=false, and clears Combatant."
    - "Run 59 result: saying 'all follow me' changed fox serial 200274 from ControlOrder Come to Follow with ControlTarget Mira Vale. It did not run AI Obey/DoOrderFollow movement, use skills, open gumps, alter inventory, change hunger/thirst, change quests/discoveries, or start combat."
    - "Run 60 result: the rejected player movement did not advance BaseAI.Obey or DoOrderFollow, so the fox remained ordered to Follow but did not prove pathing, protection, or body-blocking."
    - "BaseAI.AITimer.OnTick calls the mobile's OnThink, then controlled mobiles run Obey instead of uncontrolled Think."
    - "BaseAI.Obey dispatches OrderType.Follow to DoOrderFollow."
    - "DoOrderFollow measures distance to ControlTarget and, when the target is inside RangePerception, calls WalkMobileRange(ControlTarget, 1, bRun, 0, 1)."
    - "WalkMobileRange checks MyServerSettings.FriendsAvoidHeels(); the default S_FriendsAvoidHeels is true and the method returns that setting."
    - "When FriendsAvoidHeels is true for a controlled pet following its master, WalkMobileRange sets the pet's FollowersMax to Utility.RandomMinMax(6,9) if it is below 6, then converts that to desired distance min=FollowersMax-5 and max=min+1."
    - "Run 63 simulates that spacing random branch as 7. With the fox at floored distance 3 from Mira, desired distance 2..3 is already satisfied, so WalkMobileRange returned true before DoMove or PathFollower could run."
    - "Run 69 reused the existing FollowersMax 7 spacing value. With the fox at floored distance 5 from Mira, WalkMobileRange called DoMove(Direction.Down), and Mobile.Move placed the fox at Point3D(1212,1327,0), back inside the desired distance 2..3."
