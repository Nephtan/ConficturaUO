  animal_interaction:
    - "PacketHandlers.SingleClick finds a mobile by serial, requires from.CanSee(m), and requires Utility.InUpdateRange(from,m) before calling OnSingleClick."
    - "Utility.InUpdateRange is rectangular, accepting x and y each within 18 tiles."
    - "Historical run 37: the horse at Point3D(1196,1326,0) was dx=10, dy=5 from Point3D(1186,1321,0), so a normal single-click was within update range but outside the TameEntry range."
    - "Run 38: the horse at Point3D(1196,1326,0) is dx=5, dy=1 from Point3D(1191,1327,0), so it is inside TameEntry's rectangular range-6 gate."
    - "Horse.cs constructs Horse as a BaseMount with Tamable=true, ControlSlots=1, and usually MinTameSkill=29.1, but these are not applied to the player by single-clicking."
    - "BaseCreature.OnSingleClick adds a tame/bonded label only when Controlled && Commandable; this horse is uncontrolled, so the inherited Mobile.OnSingleClick path sends only the visible overhead name label."
    - "Run 39: PacketHandlers.ContextMenuRequest accepted the horse target because the player and horse share Map.Sosaria, from.CanSee(target) is true, and Utility.InUpdateRange is satisfied."
    - "ContextMenu's constructor called target.GetContextMenuEntries, and BaseCreature.GetContextMenuEntries added a TameEntry for this tamable uncontrolled living horse."
    - "TameEntry uses localization number 6130 and range 6. DisplayContextMenu marks it enabled because the player is within dx=5,dy=1 of the horse."
    - "ContextMenuResponse enforces entry range before OnClick; Run 40 selected the visible horse Tame entry while dx=5,dy=1, so TameEntry.OnClick ran."
    - "TameEntry.OnClick sets TargetLocked=true, sets Taming.DisableMessage=true, calls UseSkill(SkillName.Taming), and immediately invokes the horse target if UseSkill returns true."
    - "Taming.OnUse assigns an InternalTarget and would normally suppress the 'Tame which animal?' prompt while DisableMessage is true."
    - "Target.Invoke clears the target, checks map/range/visibility/LOS/access/Region.OnTarget, then calls Taming.InternalTarget.OnTarget."
    - "Taming.OnUse creates InternalTarget with range 2. Run 40 therefore stopped at Target.OnTargetOutOfRange before Taming.OnTarget because the horse was dx=5,dy=1."
    - "Corrected run 40 result: the horse would receive the generic localized message 500446, 'That is too far away.' No Taming.OnTarget, InternalTimer, SetControlMaster, owner list mutation, follower accounting, skill gain, or pet state ran."
    - "Because the tame did not reach the branch that sets m_SetSkillTime=false, InternalTarget.OnTargetFinish reset NextSkillTime to DateTime.Now after the immediate range failure."
