client_side_runtime_policy:
  active_model: "client_visible_player"
  csharp_tracing: "diagnostic_fallback_only"
  yaml_scope:
    - "current location, facing, map, region, and route intent"
    - "vitals, inventory, equipment, skills relevant to the next action"
    - "open gumps, context menus, target cursors, and player-visible messages"
    - "follower order and approximate presence"
    - "visible mobiles/items, recent route memory, world-map markers, and known terrain blockers"
  do_not_store_as_active_policy:
    - "old timer-first route blockers"
    - "exact ambient creature scheduler state"
    - "exact pet leash step requirements during routine travel"
    - "tile-by-tile audits for ordinary open-ground movement"
  diagnostic_trace_allowed_for:
    - "custom Confictura mechanics"
    - "failed or gated gumps"
    - "hidden access gates"
    - "custom region, teleporter, quest, item, or skill friction"
    - "unexpected custom-script behavior that the client cannot explain"
  diagnostic_trace_not_allowed_for:
    - "routine open-ground movement"
    - "standard combat swings"
    - "normal ambient creature wandering"
    - "ordinary pet follow during travel"
    - "visible terrain collision with trees, rocks, shorelines, mountains, walls, or doors"

macro_travel_policy:
  unit: "intention"
  default_assumption: "ordinary open-terrain movement works unless the visible route suggests dense or blocked terrain"
  route_statement_required: true
  terrain_checks:
    use_when:
      - "entering dense forest, ruins, dungeons, water, mountains, or door/wall geometry"
      - "movement fails"
      - "a visible obstacle matters to the route"
      - "a custom shard result contradicts the visible client"
    skip_when:
      - "crossing already learned or clearly open grass/jungle"
      - "only facing changes or standard walking are involved"
  stop_conditions:
    - "dangerous mobile within 0-10 tiles"
    - "visible 11-18 tile threat changes the route decision"
    - "new gump, context menu, target cursor, player message, region text, resource, corpse, chest, sign, road, shelter, or water source appears"
    - "movement fails or a physical boundary is reached"
    - "stamina reaches 0"
    - "combat, damage, death, discovery, teleport, quest, inventory, hunger, thirst, ownership, or pet-order state changes"
    - "destination or waypoint is reached"

threat_heuristic_scan:
